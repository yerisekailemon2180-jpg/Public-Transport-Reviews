<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crowdsourced Transit Comfort Tracker</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
}
h1 {
  text-align: center;
}
form {
  max-width: 600px;
  margin: auto;
  border: 1px solid #ccc;
  padding: 15px;
  border-radius: 8px;
}
label {
  display: block;
  margin-top: 10px;
}
input[type="text"], select {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  box-sizing: border-box;
}
button {
  margin-top: 15px;
  padding: 10px 20px;
}
#reports {
  max-width: 800px;
  margin: 30px auto;
}
.report {
  border-bottom: 1px solid #ddd;
  padding: 10px 0;
}
</style>
</head>
<body>

<h1>Crowdsourced Transit Comfort Tracker</h1>

<form id="reportForm">
  <h2>Log a Report</h2>
  <label for="route">Bus Route / Line:</label>
  <input type="text" id="route" required />

  <label for="crowd">Crowding Level:</label>
  <select id="crowd" required>
    <option value="">Select</option>
    <option value="Light">Light</option>
    <option value="Moderate">Moderate</option>
    <option value="Crowded">Crowded</option>
    <option value="Very Crowded">Very Crowded</option>
  </select>

  <label for="ac">AC Functionality:</label>
  <select id="ac" required>
    <option value="">Select</option>
    <option value="Working">Working</option>
    <option value="Not Working">Not Working</option>
  </select>

  <label for="delay">Delay Status:</label>
  <select id="delay" required>
    <option value="">Select</option>
    <option value="On Time">On Time</option>
    <option value="Delayed">Delayed</option>
  </select>

  <button type="submit">Log Report</button>
</form>

<div id="reports">
  <h2>Recent Reports</h2>
  <div id="reportList"></div>
</div>

<script>
  // Load existing reports from localStorage or initialize
  let reports = JSON.parse(localStorage.getItem('transitReports')) || [];

  const form = document.getElementById('reportForm');
  const reportList = document.getElementById('reportList');

  // Function to display reports
  function displayReports() {
    reportList.innerHTML = '';
    if (reports.length === 0) {
      reportList.innerHTML = '<p>No reports yet. Be the first to add!</p>';
      return;
    }
    // Show latest reports
    reports.slice().reverse().forEach(report => {
      const div = document.createElement('div');
      div.className = 'report';
      div.innerHTML = `
        <b>Route:</b> ${report.route}<br>
        <b>Crowding:</b> ${report.crowd}<br>
        <b>AC:</b> ${report.ac}<br>
        <b>Delay:</b> ${report.delay}<br>
        <small>${new Date(report.timestamp).toLocaleString()}</small>
      `;
      reportList.appendChild(div);
    });
  }

  // Handle form submission
  form.onsubmit = function(e) {
    e.preventDefault();
    const newReport = {
      route: document.getElementById('route').value,
      crowd: document.getElementById('crowd').value,
      ac: document.getElementById('ac').value,
      delay: document.getElementById('delay').value,
      timestamp: Date.now()
    };
    reports.push(newReport);
    localStorage.setItem('transitReports', JSON.stringify(reports));
    displayReports();
    form.reset();
  }

  // Initial display
  displayReports();
</script>

</body>
</html>
